app = "job-applier-api"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Cron machine — runs daily at 4am UTC (6am SAST)
# fly machine run . --schedule "0 4 * * *" --entrypoint "python jobs/schedule.py"
